    <style>
    <style>
      body { background-color: #05080f; margin: 0; font-family: "Inter", sans-serif; overflow: hidden; }
      .app-loader-wrapper {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #05080f;
        z-index: 99999;
        transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
      }
      .app-loader-wrapper.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      .app-loader-logo {
        width: 120px;
        height: auto;
        margin-bottom: 2rem;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4));
      }
      .app-loader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(197, 160, 89, 0.2);
        border-radius: 50%;
        border-top-color: #c5a059;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .7; transform: scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loader-wrapper" id="initial-loader">
        <svg class="app-loader-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="96" stroke="#c5a059" stroke-width="4" stroke-dasharray="10 10"/>
          <path d="M100 20 L150 70 L130 70 L130 150 L70 150 L70 70 L50 70 Z" fill="#c5a059"/>
          <path d="M90 150 L90 100 L110 100 L110 150 Z" fill="#05080f"/>
        </svg>
        <div class="app-loader-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
